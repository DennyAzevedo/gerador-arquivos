# O PostgreSQL NAO faz parte deste compose: usamos o container "db-postgres"
# ja existente no host, acessivel pelo backend via host.docker.internal:5432.
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gerador_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gerador_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
